# Pancakes cross-repository context registry.
#
# Membership is an explicit disclosure allowlist. Generated files are local,
# non-authoritative snapshots for manual upload to a shared ChatGPT project.

version: 2
outdir: _work/context/generated
index: context-index.md
upload_file_budget: 25
max_output_bytes: 1500000
max_total_bytes: 5000000
dirty_policy: warn

repositories:
  pancakes:
    default_root: .
    authority: Pancakes product, node architecture, governance, and public documentation
  pitchfork:
    default_root: ../pitchfork
    authority: Shared contracts, projections, settlement, resource state, and runtime architecture
  honk:
    default_root: ../honk
    authority: Lone Honk client design and documentation
  redwitch:
    default_root: ../redwitch
    authority: Red Witch product design and documentation

composites:
  - id: pancakes
    out: pancakes-context.md
    note: Current Pancakes product, architecture, governance, and human-flourishing context.
    sources:
      - {repo: pancakes, path: docs/index.md, classification: public, reviewed: true}
      - {repo: pancakes, path: docs/pancakes-ecosystem-overview.md, classification: public, reviewed: true}
      - {repo: pancakes, path: docs/pancakes-primer.md, classification: public, reviewed: true}
      - {repo: pancakes, path: docs/pancakes_client_node_architecture.md, classification: public, reviewed: true}
      - {repo: pancakes, path: docs/pancakes_node_infrastructure.md, classification: public, reviewed: true}
      - {repo: pancakes, path: docs/pancakes-open-gis.md, classification: public, reviewed: true, required: false}
      - {repo: pancakes, path: docs/pancakes-open-barcodes.md, classification: public, reviewed: true, required: false}
      - {repo: pancakes, path: docs/pancakes-node-capabilities.md, classification: public, reviewed: true}
      - {repo: pancakes, path: docs/pancakes-reference-services.md, classification: public, reviewed: true}
      - {repo: pancakes, path: docs/pancakes-place-model.md, classification: public, reviewed: true}
      - {repo: pancakes, path: docs/pancakes-ethics-framework.md, classification: public, reviewed: true}
      - {repo: pancakes, path: docs/pancakes_charter_of_rights.md, classification: public, reviewed: true}
      - {repo: pancakes, path: docs/human-flourishing-framework.md, classification: public, reviewed: true}
      - {repo: pancakes, path: docs/pancakes-common-good-model.md, classification: public, reviewed: true}
      - {repo: pancakes, path: docs/pancakes-stewardship-model.md, classification: public, reviewed: true}
      - {repo: pancakes, path: docs/pancakes-commonwealth-model.md, classification: public, reviewed: true}
      - {repo: pancakes, path: docs/pancakes-lifecraft.md, classification: public, reviewed: true}
      - {repo: pancakes, path: docs/pancakes-recipes.md, classification: public, reviewed: true}
      - {repo: pancakes, path: docs/pancakes-grimoires.md, classification: public, reviewed: true}
      - {repo: pancakes, path: docs/pancakes-household-management-model.md, classification: public, reviewed: true}
      - {repo: pancakes, path: docs/pancakes_service_exchange.md, classification: public, reviewed: true}
      - {repo: pancakes, path: docs/pancakes-goods-and-services-model.md, classification: public, reviewed: true}
      - {repo: pancakes, path: docs/pancakes-pitchfork-economic-theory.md, classification: public, reviewed: true}
      - {repo: pancakes, path: docs/non_exploitative_infrastructure.md, classification: public, reviewed: true}
